<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPX - International Payroll Executives</title>
    <link rel="icon" type="image/png" href="website/favicon.png">
    <script>
    (function() {
        var theme = localStorage.getItem('ipx-theme');
        if (!theme) {
            theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        if (theme === 'dark') {
            window.location.replace('cinematic/index.html');
        } else {
            window.location.replace('website/index.html');
        }
    })();
    </script>
    <style>
        body { margin: 0; background: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; color: #666; }
    </style>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
